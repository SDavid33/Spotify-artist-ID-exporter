<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Followed Releases Callback</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #121212;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
      line-height: 1.2;
    }
    p {
      margin: 0 0 12px;
      color: #b3b3b3;
      line-height: 1.5;
    }
    .success {
      color: #1db954;
      font-weight: 700;
      margin-bottom: 14px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid #3a3a3a;
      background: #0f0f0f;
      color: #ffffff;
      padding: 14px;
      font: 14px/1.5 Consolas, "Courier New", monospace;
      margin: 12px 0 14px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #1db954;
      color: #000000;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: #2a2a2a;
      color: #ffffff;
    }
    .small {
      font-size: 0.95rem;
      color: #9a9a9a;
    }
    code {
      color: #1db954;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="success">Spotify login finished.</div>
    <h1>Copy this URL back into Followed Releases</h1>
    <p>
      Paste the full callback URL below into the app's <strong>Complete Login</strong> field.
    </p>
    <textarea id="callbackUrl" readonly></textarea>
    <div class="actions">
      <button id="copyBtn" type="button">Copy URL</button>
      <button id="selectBtn" class="secondary" type="button">Select All</button>
    </div>
    <p class="small">
      Redirect URI for Spotify Developer Dashboard:
      <code>https://spotify-artist-id-exporter-by-david33.netlify.app/fr-callback.html</code>
    </p>
  </main>

  <script>
    const callbackUrl = document.getElementById("callbackUrl");
    const copyBtn = document.getElementById("copyBtn");
    const selectBtn = document.getElementById("selectBtn");

    callbackUrl.value = window.location.href;

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(callbackUrl.value);
        copyBtn.textContent = "Copied!";
        setTimeout(() => {
          copyBtn.textContent = "Copy URL";
        }, 1500);
      } catch {
        callbackUrl.select();
        document.execCommand("copy");
        copyBtn.textContent = "Copied!";
        setTimeout(() => {
          copyBtn.textContent = "Copy URL";
        }, 1500);
      }
    });

    selectBtn.addEventListener("click", () => {
      callbackUrl.focus();
      callbackUrl.select();
    });
  </script>
</body>
</html>
